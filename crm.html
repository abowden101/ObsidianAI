<!DOCTYPE html>
<html>
<head>
<title>CRM Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<section class="section">
<div class="container">

<h1>Leads Dashboard</h1>

<div class="grid grid-3">

<div class="card">
<h3>Total Leads</h3>
<p id="leads">0</p>
</div>

<div class="card">
<h3>High Quality</h3>
<p id="high">0</p>
</div>

<div class="card">
<h3>Conversion Rate</h3>
<p>--%</p>
</div>

</div>

</div>
</section>

<script>
let leads = localStorage.getItem("leads") || 0;
let high = localStorage.getItem("high") || 0;

document.getElementById("leads").innerText = leads;
document.getElementById("high").innerText = high;
</script>

</body>
</html>
