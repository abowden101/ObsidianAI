    <main class="section" id="contact-form">
        <div class="section-tag">Get Started</div>
        <div class="contact-grid">
            <div class="contact-left">
                <h2>Free Orlando Security Assessment</h2>
                <p>Submit your details and we'll schedule a 30-minute consultation. No pitch decks — just a direct look at your infrastructure.</p>
                
                <div class="contact-detail">
                    <span class="contact-detail-label">Email</span>
                    <span class="contact-detail-value"><a href="mailto:team@obsidianai.org">team@obsidianai.org</a></span>
                </div>
                <div class="contact-detail">
                    <span class="contact-detail-label">Location</span>
                    <span class="contact-detail-value">Orlando, Florida</span>
                </div>
                <div class="contact-detail">
                    <span class="contact-detail-label">LinkedIn</span>
                    <span class="contact-detail-value"><a href="https://www.linkedin.com/in/antonio-bowden" target="_blank">Antonio Bowden</a></span>
                </div>
            </div>
            
            <div class="contact-form-wrap">
                <form action="https://formspree.io/f/mbdkongb" method="POST">
                    <div class="form-row">
                        <div class="form-field">
                            <label>Name</label>
                            <input type="text" name="name" placeholder="Your name" required>
                        </div>
                        <div class="form-field">
                            <label>Email</label>
                            <input type="email" name="email" placeholder="your@company.com" required>
                        </div>
                    </div>
                    <div class="form-field">
                        <label>Message</label>
                        <textarea name="message" rows="6" placeholder="Describe your environment — industry, headcount, current stack, pain points..." required></textarea>
                    </div>
                    <div class="form-submit">
                        <span class="form-note">Responds within 24h</span>
                        <button type="submit" class="btn btn-primary">Send Request →</button>
                    </div>
                </form>
            </div>
        </div>
